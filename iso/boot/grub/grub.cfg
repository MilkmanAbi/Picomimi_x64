# Picomimi-x64 GRUB configuration
# 
# KEY LINES: gfxmode + gfxpayload=keep
#
# These tell GRUB to:
#   1. Set a VESA/GOP video mode before loading the kernel
#   2. Keep that mode active when jumping to the kernel
#      (instead of switching back to VGA text mode)
#
# GRUB then passes the framebuffer address, pitch, width, height,
# and pixel format to the kernel via the Multiboot2 framebuffer tag
# (type 8). Without gfxpayload=keep the kernel gets type 2 (text).
#
# References:
#   - GRUB manual: 6.3 "gfxmode", 6.4 "gfxpayload"
#   - grub-core/normal/main.c: grub_normal_execute()
#   - grub-core/video/video.c: grub_video_set_mode()

set timeout=3
set default=0

# Request 1024x768 at 32bpp.
# GRUB will negotiate the closest mode the hardware supports.
# Fallback chain: 1024x768x32 -> 1024x768x24 -> 800x600x32 -> auto
set gfxmode=1024x768x32,1024x768x24,800x600x32,auto

# CRITICAL: keep the graphical mode when loading the kernel.
# Without this GRUB resets to text mode before kernel entry.
set gfxpayload=keep

# Load the video module so GRUB can actually set graphics modes
insmod all_video
insmod gfxterm
insmod vbe
insmod vga

menuentry "Picomimi-x64" {
    multiboot2 /boot/kernel
    boot
}

menuentry "Picomimi-x64 (serial debug)" {
    multiboot2 /boot/kernel console=ttyS0
    boot
}

menuentry "Picomimi-x64 (VGA text fallback)" {
    # Override gfxpayload to force text mode for debugging
    set gfxpayload=text
    multiboot2 /boot/kernel
    boot
}
